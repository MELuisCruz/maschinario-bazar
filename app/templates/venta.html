{% extends "shell.html" %}
{% block title %}Venta — {{ business_name }}{% endblock %}
{% block content %}
<form hx-post="/venta/scan" hx-target="#venta-main" hx-swap="outerHTML"
      data-reset-on-success="true" autocomplete="off"
      style="margin-bottom:.6rem;position:relative;">
  <label for="scan-input">Escanea, teclea el código o busca por nombre</label>
  <input id="scan-input" name="codigo" autocomplete="off"
         placeholder="Código de barras / SKU / nombre"
         hx-get="/venta/buscar" hx-trigger="keyup changed delay:250ms"
         hx-target="#sugerencias" hx-swap="innerHTML" />
  <div id="sugerencias" class="sugerencias"></div>
</form>

<details style="margin-bottom:.8rem;">
  <summary class="btn" style="display:inline-block;cursor:pointer;">➕ Producto especial</summary>
  <form hx-post="/venta/especial" hx-target="#venta-main" hx-swap="outerHTML"
        data-reset-on-success="true"
        class="panel" style="margin-top:.4rem;display:flex;flex-direction:column;gap:.3rem;max-width:480px;">
    <label>Referencia <span class="muted">(sale en el ticket, máx. 50)</span></label>
    <input name="referencia" maxlength="50" required placeholder="p. ej. Artículo a granel" />
    <label>Descripción / notas <span class="muted">(interna, trazabilidad, máx. 100)</span></label>
    <input name="descripcion" maxlength="100" placeholder="detalle (no se imprime en el ticket)" />
    <label>Precio con IVA (16%)</label>
    <div style="display:flex;gap:.3rem;">
      <select name="divisa" style="width:5rem;">
        <option value="MXN" selected>MXN</option>
        <option value="USD">USD</option>
        <option value="EUR">EUR</option>
      </select>
      <input name="precio" class="mono" inputmode="decimal" required
             style="text-align:right;flex:1;" placeholder="monto" />
    </div>
    <button class="btn btn-primary" type="submit" style="margin-top:.4rem;">Agregar producto especial</button>
  </form>
</details>

{% include "partials/_venta_main.html" %}
{% endblock %}
